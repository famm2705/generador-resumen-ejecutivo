name: PMO EVM Dashboard

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions schedules use UTC. 01:00 UTC Monday = 8:00 PM Sunday in Panama.
    - cron: "0 1 * * 1"

permissions:
  contents: read

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate and upload dashboard
        env:
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          ONEDRIVE_INPUT_PATH: ${{ vars.ONEDRIVE_INPUT_PATH }}
          ONEDRIVE_INPUT_FOLDER: ${{ vars.ONEDRIVE_INPUT_FOLDER }}
          ONEDRIVE_INPUT_LATEST: "true"
          ONEDRIVE_PROMPT_PATH: ${{ vars.ONEDRIVE_PROMPT_PATH }}
          ONEDRIVE_OUTPUT_FOLDER: ${{ vars.ONEDRIVE_OUTPUT_FOLDER }}
          ONEDRIVE_OUTPUT_CURRENT_DATE: "true"
          USE_OPENAI: "true"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: python cloud_onedrive_runner.py
