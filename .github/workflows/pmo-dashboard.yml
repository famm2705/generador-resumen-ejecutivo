name: PMO EVM Dashboard

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions schedules use UTC. 12:00 UTC = 8:00 AM America/New_York during EDT.
    - cron: "0 12 * * 1-5"

permissions:
  contents: read

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate and upload dashboard
        env:
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          ONEDRIVE_INPUT_PATH: ${{ vars.ONEDRIVE_INPUT_PATH }}
          ONEDRIVE_PROMPT_PATH: ${{ vars.ONEDRIVE_PROMPT_PATH }}
          ONEDRIVE_OUTPUT_FOLDER: ${{ vars.ONEDRIVE_OUTPUT_FOLDER }}
          ONEDRIVE_OUTPUT_FILENAME: ${{ vars.ONEDRIVE_OUTPUT_FILENAME }}
          USE_OPENAI: "true"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: python cloud_onedrive_runner.py
